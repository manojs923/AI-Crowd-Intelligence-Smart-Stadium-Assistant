steps:
  # Install dependencies
  - name: 'node'
    entrypoint: 'npm'
    args: ['install']

  # Run Tests
  - name: 'node'
    entrypoint: 'npm'
    args: ['run', 'test']

  # Build the project
  - name: 'node'
    entrypoint: 'npm'
    args: ['run', 'build']

  # Deploy to Firebase (simulated)
